<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <link rel="shortcut icon" type="image/png" href="https://lh3.googleusercontent.com/d/1ABmeeS_5tXR0iQQOSsmKWm9vy1FpSTyL?authuser=0" />
    <title>PENGUMPULAN NASKAH SOAL ASAJ</title>
    <style>
        /* CSS untuk memastikan iframe mengisi seluruh viewport tanpa scrollbar tambahan dari halaman embed */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mencegah scrollbar pada body halaman embed */
        }
        iframe {
            display: block; /* Menghilangkan spasi ekstra di bawah iframe inline */
            border: none; /* Sudah ada di inline style, tapi baik untuk ditekankan */
        }
    </style>
</head>
<body>
    <iframe  
        id="appFrame"
        src="https://script.google.com/macros/s/AKfycbwcEpWg8NlTH7R4Ny_I7AVnpQTExsM_juunNLtfTwiOCrfLroPObpLuKPRkTMM4MjLdUA/exec"
        width="100%"
        height="100%"
        allowfullscreen="true"
        allow="camera" 
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
        Browser Anda tidak mendukung iframe.
    </iframe>
</body>
</html>
